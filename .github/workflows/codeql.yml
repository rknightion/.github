name: CodeQL (reusable)

# Reusable CodeQL Advanced workflow for the rknightion fleet. Callers pass a JSON
# array of {language, build-mode} matrix entries. Results upload to the caller
# repo's Security tab (reusable workflows run in the caller's context). Shared
# query/noise policy lives in codeql/codeql-config.yml in this repo.

on:
  workflow_call:
    inputs:
      languages:
        description: 'JSON array of CodeQL matrix include entries, e.g. [{"language":"python","build-mode":"none"}]'
        required: true
        type: string

permissions: {}

# Cancel a superseded scan on the same ref (rapid pushes / PR updates) to free runners.
# Unique group prefix per reusable so a caller invoking several reusables doesn't put
# them in one group where they'd cancel each other.
concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    timeout-minutes: ${{ (matrix.language == 'swift' && 120) || 360 }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.languages) }}
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: rknightion/.github/codeql/codeql-config.yml@main

      - name: Autobuild
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
