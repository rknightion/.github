name: Snyk (reusable)

# Reusable Snyk -> Snyk Cloud monitor for the rknightion fleet. Reports Open Source
# (SCA), Code (SAST), Infrastructure-as-Code, and Container findings to Snyk Cloud so
# they show up centrally under the org. Every Snyk step is NON-GATING
# (continue-on-error): newly disclosed issues surface in Snyk Cloud without blocking CI
# or Renovate automerge, matching the docker-security/codeql posture. Requires the
# SNYK_TOKEN secret (a Snyk service-account token); callers pass it via `secrets: inherit`.
#
# Callers typically run this on push to main + a weekly schedule. Inputs:
#   language  go | python | node | none  -> toolchain setup so SCA can resolve deps
#   run-iac   true to run Snyk IaC and report (repos with terraform/helm/k8s)
#   image     image ref to monitor (empty = skip), e.g. ghcr.io/${{ github.repository }}:latest

on:
  workflow_call:
    inputs:
      language:
        description: "go | python | node | none (drives toolchain setup for SCA)"
        type: string
        default: "none"
      run-iac:
        description: "Run Snyk IaC scan and report to Snyk Cloud"
        type: boolean
        default: false
      image:
        description: "Container image ref to monitor (empty = skip)"
        type: string
        default: ""
    secrets:
      SNYK_TOKEN:
        required: true

permissions: {}

# Cancel a superseded run on the same ref (rapid pushes) to free runners. Unique group
# prefix per reusable so a caller invoking several reusables doesn't put them in one
# group where they'd cancel each other.
concurrency:
  group: snyk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snyk:
    name: snyk monitor
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      # Stable project grouping in Snyk Cloud across runs (one token = passed as a single arg).
      SNYK_ARG_REF: --target-reference=${{ github.ref_name }}
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        if: inputs.language == 'go'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Set up Python
        if: inputs.language == 'python'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Set up Node
        if: inputs.language == 'node'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "lts/*"

      - name: Install Python deps (best-effort)
        if: inputs.language == 'python'
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip || true
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi
          if [ -f pyproject.toml ]; then pip install -e . || pip install . || true; fi

      - name: Install Node deps (best-effort)
        if: inputs.language == 'node'
        continue-on-error: true
        run: npm ci || npm install || true

      - name: Install Snyk CLI
        run: |
          mkdir -p "$HOME/.local/bin"
          curl --proto '=https' --tlsv1.2 -sSfL https://static.snyk.io/cli/latest/snyk-linux -o "$HOME/.local/bin/snyk"
          chmod +x "$HOME/.local/bin/snyk"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/snyk" --version

      - name: Snyk Open Source (monitor)
        continue-on-error: true
        run: snyk monitor --all-projects "${SNYK_ARG_REF}" || true

      - name: Snyk Code (report to Snyk Cloud)
        continue-on-error: true
        run: snyk code test --report "${SNYK_ARG_REF}" || true

      - name: Snyk IaC (report to Snyk Cloud)
        if: inputs.run-iac
        continue-on-error: true
        run: snyk iac test --report "${SNYK_ARG_REF}" || true

      - name: Log in to GHCR (for container monitor)
        if: inputs.image != ''
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${ACTOR}" --password-stdin

      - name: Snyk Container (monitor)
        if: inputs.image != ''
        continue-on-error: true
        env:
          IMAGE: ${{ inputs.image }}
        run: snyk container monitor "${IMAGE}" "${SNYK_ARG_REF}" || true
