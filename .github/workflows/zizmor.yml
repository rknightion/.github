name: zizmor (reusable)

# Reusable GitHub Actions security audit (zizmor). Findings upload to the caller
# repo's Security tab as SARIF.

on:
  workflow_call: {}

permissions: {}

jobs:
  zizmor:
    name: Run zizmor
    # SARIF upload needs security-events: write, which GitHub does not grant to
    # pull_request runs from forks (the upload would 403 and fail the job). Run
    # on push + same-repo PRs only; fork PRs are re-scanned after merge on push.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # EVERY uses: must be hash-pinned — first-party rknightion reusables included.
      # As of v1.0.0 the fleet pins these reusables to a release SHA (with a # vX.Y.Z
      # comment) and Renovate maintains the bump, so floating @main is no longer used;
      # requiring hash-pin here makes that self-enforcing (a reintroduced @main fails
      # CI). Written as an auto-discovered .github/zizmor.yml (ephemeral, not committed);
      # skipped if the repo already ships its own zizmor config.
      - name: Write zizmor policy
        run: |
          if [ ! -e .github/zizmor.yml ]; then
            mkdir -p .github
            {
              echo 'rules:'
              echo '  unpinned-uses:'
              echo '    config:'
              echo '      policies:'
              echo '        "*": hash-pin'
            } > .github/zizmor.yml
          fi

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
