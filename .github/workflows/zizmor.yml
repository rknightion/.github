name: zizmor (reusable)

# Reusable GitHub Actions security audit (zizmor). Findings upload to the caller
# repo's Security tab as SARIF.

on:
  workflow_call: {}

permissions: {}

jobs:
  zizmor:
    name: Run zizmor
    # SARIF upload needs security-events: write, which GitHub does not grant to
    # pull_request runs from forks (the upload would 403 and fail the job). Run
    # on push + same-repo PRs only; fork PRs are re-scanned after merge on push.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # First-party reusable workflows are intentionally referenced @main (so a
      # central change propagates instantly); only require a ref-pin for them,
      # while every third-party action must still be hash-pinned.
      - name: Write zizmor policy
        run: |
          cat > "${RUNNER_TEMP}/zizmor.yml" <<'EOF'
          rules:
            unpinned-uses:
              config:
                policies:
                  "rknightion/*": ref-pin
                  "*": hash-pin
          EOF

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          config: ${{ runner.temp }}/zizmor.yml
