name: dependency-review (reusable)

# Reusable dependency review: scans dependency-manifest changes in a PR and flags
# newly introduced known-vulnerable packages. PR-only (needs the base/head diff).

on:
  workflow_call: {}

permissions: {}

# Cancel a superseded run on the same ref (PR updates) to free runners. Unique group
# prefix per reusable so a caller invoking several reusables doesn't put them in one
# group where they'd cancel each other.
concurrency:
  group: dependency-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Posting a PR comment needs pull-requests: write, which fork PRs don't
          # get — skip the comment for fork PRs so the review still runs (and
          # still fails on high-severity) without erroring on the comment call.
          comment-summary-in-pr: ${{ (github.event.pull_request.head.repo.full_name == github.repository) && 'on-failure' || 'never' }}
          fail-on-severity: high
