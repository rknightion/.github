name: docker-security (reusable)

# Reusable container hygiene: hadolint (Dockerfile lint) + Trivy (filesystem
# vuln/misconfig/secret scan). Both upload SARIF to the caller's Security tab and
# are non-gating (no-fail / no exit-code gate) so newly disclosed CVEs surface
# without blocking. Callers typically run this on push to main + weekly schedule;
# pull_request is omitted upstream because fork PRs can't get security-events:write.

on:
  workflow_call: {}

permissions: {}

# Cancel a superseded run on the same ref (rapid pushes / PR updates) to free runners.
# Unique group prefix per reusable so a caller invoking several reusables doesn't put
# them in one group where they'd cancel each other.
concurrency:
  group: docker-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hadolint:
    name: hadolint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          recursive: true
          format: sarif
          output-file: hadolint.sarif
          no-fail: true
      - name: Upload hadolint SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: hadolint.sarif
          category: hadolint

  trivy:
    name: trivy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln,misconfig,secret
          format: sarif
          output: trivy.sarif
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy-fs
